<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - هش HASH POS</title>
    <!-- Base styles -->
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="login.css">
    <!-- Google Fonts -->
    
    
    <link rel="stylesheet" href="node_modules/@fontsource/cairo/index.css">
    <!-- Phosphor Icons -->
    <script src="node_modules/@phosphor-icons/web/src/index.js"></script>
</head>
<body class="login-page-body dark-theme">

    <div class="login-bg-spot blue"></div>
    <div class="login-bg-spot green"></div>

    <div class="login-box">
        <img src="1111.png" alt="شعار هش HASH" class="login-logo" id="dyn-login-logo">
        
        <div class="login-title">
            <h1 id="dyn-login-name">هش HASH <span class="highlight">POS</span></h1>
            <p>أدخل بيانات الاعتماد للوصول لنظام الإدارة</p>
        </div>

        <form id="loginForm">
            <div class="error-msg" id="login-error">
                <i class="ph-fill ph-warning-circle"></i> اسم المستخدم أو كلمة المرور غير صحيحة.
            </div>

            <div class="login-form-group">
                <label>اسم المستخدم (Username)</label>
                <div class="login-input-wrapper">
                    <input type="text" id="username" class="login-input" placeholder="admin" required autocomplete="off">
                    <i class="ph-fill ph-user"></i>
                </div>
            </div>

            <div class="login-form-group">
                <label>كلمة المرور (Password)</label>
                <div class="login-input-wrapper">
                    <input type="password" id="password" class="login-input" placeholder="••••••••" required>
                    <i class="ph-fill ph-lock-key"></i>
                </div>
            </div>

            <button type="submit" class="btn-login" id="btn-login-submit">
                تسجيل الدخول <i class="ph-bold ph-sign-in"></i>
            </button>
        </form>

        <div class="login-footer">
            جميع الحقوق محفوظة &copy; 2026 - نظام هش HASH POS
        </div>
    </div>

    <!-- Script to handle dynamic settings for logo on login screen before auth -->
    <script>
        // ═══════════════════════════════════════════════════════
        // منطق شاشة تسجيل الدخول:
        // - الافتراضي: شعار وإسم هش HASH (الشعار الرسمي للبرنامج)
        // - إذا ضبط المالك اسم مطعمه وشعاره من الإعدادات → تظهر بيانات المطعم
        // ═══════════════════════════════════════════════════════
        document.addEventListener('DOMContentLoaded', () => {
            const saved = localStorage.getItem('restaurant_settings');
            const logoEl = document.getElementById('dyn-login-logo');
            const nameEl = document.getElementById('dyn-login-name');

            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    // استخدم بيانات المطعم إذا أدخلها المستخدم (اسم مختلف عن هش)
                    const restaurantName = (data.name || '').trim();
                    const restaurantLogo = (data.logo || '').trim();

                    // إذا كان الشعار base64 أو مساراً لملف مطعم حقيقي
                    if (restaurantLogo && restaurantLogo !== '1111.png' && restaurantLogo !== '1(1).png') {
                        logoEl.src = restaurantLogo;
                    }
                    // إذا كان اسم مطعم حقيقي مختلف عن الافتراضي
                    if (restaurantName && restaurantName !== 'هش HASH' && restaurantName !== 'هـــش HASH') {
                        nameEl.innerHTML = restaurantName + ' <span class="highlight">POS</span>';
                    }
                } catch(e) { console.error('Login settings parse error', e); }
            }
        });
    </script>
    <script src="script.js"></script>
    <script src="login.js"></script>
</body>
</html>
